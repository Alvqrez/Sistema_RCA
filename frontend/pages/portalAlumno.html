<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Portal del Alumno - RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro")
        document.documentElement.classList.add("dark-mode");
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>

      <main class="content">
        <!-- HERO DE BIENVENIDA -->
        <div class="portal-hero">
          <div class="portal-hero-left">
            <div class="portal-avatar">
              <iconify-icon icon="lucide:user-circle-2"></iconify-icon>
            </div>
            <div>
              <p class="portal-saludo">¡Bienvenido de nuevo!</p>
              <h1 class="portal-nombre" id="heroNombre">Cargando...</h1>
              <div
                style="
                  display: flex;
                  gap: 8px;
                  flex-wrap: wrap;
                  margin-top: 6px;
                "
              >
                <span class="badge-unidad" id="heroMatricula"></span>
                <span class="badge-unidad" id="heroCarrera"></span>
              </div>
            </div>
          </div>
          <div class="portal-hero-right">
            <div class="stat-hero">
              <iconify-icon
                icon="mdi:check-circle-outline"
                style="color: #10b981"
              ></iconify-icon>
              <div>
                <strong id="cntAprobadas">—</strong><span>Aprobadas</span>
              </div>
            </div>
            <div class="stat-hero">
              <iconify-icon
                icon="mdi:close-circle-outline"
                style="color: #ef4444"
              ></iconify-icon>
              <div>
                <strong id="cntReprobadas">—</strong><span>Reprobadas</span>
              </div>
            </div>
            <div class="stat-hero">
              <iconify-icon
                icon="mdi:school-outline"
                style="color: #3b82f6"
              ></iconify-icon>
              <div>
                <strong id="cntCursando">—</strong><span>Cursando</span>
              </div>
            </div>
            <div class="stat-hero">
              <iconify-icon
                icon="mdi:numeric"
                style="color: #8b5cf6"
              ></iconify-icon>
              <div>
                <strong id="promedioGeneral">—</strong><span>Promedio</span>
              </div>
            </div>
          </div>
        </div>

        <!-- MATERIAS ACTUALES (Cursando) -->
        <div class="card" id="cardCursando">
          <div class="card-title">
            <iconify-icon icon="mdi:book-open-outline"></iconify-icon>
            Materias que cursa actualmente
            <span
              class="badge-unidad"
              id="periodoActualBadge"
              style="margin-left: auto"
            ></span>
          </div>
          <div id="gridMaterias" class="materias-grid"></div>
        </div>

        <!-- HISTORIAL DE CALIFICACIONES -->
        <div class="card">
          <div class="card-title">
            <iconify-icon icon="mdi:clipboard-text-outline"></iconify-icon>
            Historial de calificaciones
            <div
              style="
                margin-left: auto;
                display: flex;
                gap: 8px;
                align-items: center;
              "
            >
              <select
                id="filtroPeriodo"
                class="sel-mini"
                onchange="filtrarHistorial()"
              >
                <option value="">Todos los periodos</option>
              </select>
              <button class="btn btn-outline btn-sm" onclick="window.print()">
                <iconify-icon icon="mdi:printer-outline"></iconify-icon>
                Imprimir
              </button>
            </div>
          </div>

          <div class="tabla-wrapper">
            <table class="tabla-calificaciones">
              <thead>
                <tr>
                  <th>Materia</th>
                  <th>Periodo</th>
                  <th>Maestro</th>
                  <th>Tipo</th>
                  <th>Calificación</th>
                  <th>Estatus</th>
                </tr>
              </thead>
              <tbody id="tablaHistorial"></tbody>
            </table>
          </div>
        </div>

        <!-- CALIFICACIONES POR UNIDAD (detalle) -->
        <div class="card">
          <div class="card-title">
            <iconify-icon icon="mdi:table-large"></iconify-icon>
            Detalle de unidades
            <div style="margin-left: auto">
              <select
                id="filtroGrupoUnidades"
                class="sel-mini"
                onchange="cargarUnidades()"
              >
                <option value="">Selecciona una materia...</option>
              </select>
            </div>
          </div>
          <div id="tablaUnidadesWrap">
            <div class="empty-state">
              <iconify-icon icon="mdi:clipboard-list-outline"></iconify-icon>
              <p>Selecciona una materia para ver el detalle de unidades</p>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/portalAlumno.js"></script>
  </body>
</html>
