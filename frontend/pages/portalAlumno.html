<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Portal Alumno</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>RCA</h2>
        <nav>
            <a href="#" class="active">Boleta</a>
            <a href="#">Horario</a>
            <a href="#" onclick="cerrarSesion()">Cerrar sesión</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <!-- HEADER -->
        <div class="header">
            <h2>RCA - Sistema de Resultados Académicos</h2>
        </div>

        <h1>Portal de Alumno</h1>

        <!-- DATOS -->
        <div class="card">
            <h2>Datos del Alumno</h2>
            <p><b>Matrícula:</b> <span id="matricula"></span></p>
            <p><b>Nombre:</b> <span id="nombre"></span></p>
            <p><b>Carrera:</b> Sistemas</p>
        </div>

        <!-- BOLETA -->
        <div class="card">

            <!-- ENCABEZADO DE BOLETA -->
            <div style="text-align:center; margin-bottom:15px;">
                <h2>BOLETA DE CALIFICACIONES</h2>
                <p><b>Periodo:</b> 2026</p>
            </div>

            <!-- TABLA -->
            <table>
                <thead>
                    <tr>
                        <th>Materia</th>
                        <th>Calificación</th>
                    </tr>
                </thead>
                <tbody id="tablaBoleta"></tbody>
            </table>

            <!-- PROMEDIO -->
            <div style="margin-top:15px; text-align:right;">
                <p><b>Promedio:</b> <span id="promedio"></span></p>
            </div>

        </div>

    </main>
</div>

<script src="../js/portalAlumno.js"></script>

</body>
</html>
