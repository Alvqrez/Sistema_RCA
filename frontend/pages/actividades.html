<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Actividades</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="layout">

<aside class="sidebar">
    <h2>RCA</h2>
    <nav>
        <a href="unidades.html">Unidades</a>
        <a href="actividades.html" class="active">Actividades</a>
    </nav>
</aside>

<main class="content">

<h1>Actividades</h1>

<div class="card">
    <h2>Registrar Actividad</h2>

    <form id="formActividad">

        <label>Unidad</label>
        <select id="unidadActividad"></select>

        <label>Nombre</label>
        <input type="text" id="nombreActividad" required>

        <label>Porcentaje (%)</label>
        <input type="number" id="porcentaje" min="1" max="100" required>

        <button type="submit">Guardar</button>

        <p id="mensajeActividad"></p>

    </form>
</div>

<div class="card">
    <h2>Lista de Actividades</h2>

    <table>
        <thead>
            <tr>
                <th>Actividad</th>
                <th>%</th>
            </tr>
        </thead>
        <tbody id="tablaActividades"></tbody>
    </table>

</div>

</main>
</div>

</body>
</html>
