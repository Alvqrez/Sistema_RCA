<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Actividades - RCA</title>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>

      <main class="content">
        <h1>Actividades</h1>

        <div class="card">
          <h2>Registrar Actividad</h2>
          <form id="formActividad" class="form-grid">
            <div>
              <label>Grupo</label>
              <select id="grupoActividad" required>
                <option value="">-- Selecciona grupo --</option>
              </select>
            </div>
            <div>
              <label>Unidad</label>
              <select id="unidadActividad" required>
                <option value="">-- Selecciona unidad --</option>
              </select>
            </div>
            <div>
              <label>Nombre de la actividad</label>
              <input type="text" id="nombreActividad" required />
            </div>
            <div>
              <label>Ponderación (%)</label>
              <input
                type="number"
                id="ponderacion"
                min="1"
                max="100"
                required
              />
            </div>
            <div>
              <label>Tipo de evaluación</label>
              <select id="tipoEvaluacion" required>
                <option value="">Seleccione</option>
                <option value="Sumativa">Sumativa</option>
                <option value="Formativa">Formativa</option>
                <option value="Diagnóstica">Diagnóstica</option>
              </select>
            </div>
            <div>
              <label>Fecha de entrega</label>
              <input type="date" id="fechaEntrega" />
            </div>
            <div class="botones">
              <button type="submit" class="btn-guardar">Guardar</button>
              <button type="reset" class="btn-cancelar">Cancelar</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Lista de Actividades</h2>
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>Grupo</th>
                <th>Unidad</th>
                <th>Actividad</th>
                <th>Ponderación</th>
                <th>Tipo</th>
                <th>Fecha</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaActividades"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/actividades.js"></script>
  </body>
</html>
