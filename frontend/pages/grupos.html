<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Grupos - RCA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar"></aside>

    <main class="content">
        <h1>Grupos</h1>

        <div class="card">
            <h2>Registrar Grupo</h2>
            <form id="formGrupo" class="form-grid">

                <div>
                    <label>Clave de materia</label>
                    <input type="text" id="claveMateria" placeholder="Ej. ISC-101" required>
                </div>

                <div>
                    <label>Número de empleado (maestro)</label>
                    <input type="text" id="numeroEmpleado" required>
                </div>

                <div>
                    <label>ID Periodo</label>
                    <input type="number" id="idPeriodo" required>
                </div>

                <div>
                    <label>Límite de alumnos</label>
                    <input type="number" id="limiteAlumnos" value="30">
                </div>

                <div>
                    <label>Horario</label>
                    <input type="text" id="horario" placeholder="Ej. Lun-Mie-Vie 07:00-08:00">
                </div>

                <div>
                    <label>Aula</label>
                    <input type="text" id="aula" placeholder="Ej. S1">
                </div>

                <div class="botones">
                    <button type="submit" class="btn-guardar">Guardar</button>
                    <button type="reset"  class="btn-cancelar">Cancelar</button>
                </div>

            </form>
        </div>

        <div class="card">
            <h2>Lista de Grupos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Materia</th>
                        <th>Maestro</th>
                        <th>Periodo</th>
                        <th>Aula</th>
                        <th>Horario</th>
                        <th>Estatus</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaGrupos"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="../js/sidebar.js"></script>
<script src="../js/grupos.js"></script>
</body>
</html>
