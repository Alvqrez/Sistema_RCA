<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Grupos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h2>RCA</h2>
        <nav>
            <a href="alumnos.html">Alumnos</a>
            <a href="materias.html">Materias</a>
            <a href="maestros.html">Maestros</a>
            <a href="grupos.html" class="active">Grupos</a>
            <a href="calificaciones.html">Calificaciones</a>
        </nav>
    </aside>

    <main class="content">

        <h1>Grupos</h1>

        <div class="card">
            <h2>Registrar Grupo</h2>

            <form class="form-grid">

                <div>
                    <label>ID Grupo</label>
                    <input type="text">
                </div>

                <div>
                    <label>Materia</label>
                    <input type="text">
                </div>

                <div>
                    <label>Maestro</label>
                    <input type="text">
                </div>

                <div>
                    <label>Periodo</label>
                    <input type="text">
                </div>

                <div>
                    <label>Límite de alumnos</label>
                    <input type="number">
                </div>

                <div>
                    <label>Horario</label>
                    <input type="text">
                </div>

                <div>
                    <label>Aula</label>
                    <input type="text">
                </div>

                <div class="botones">
                    <button type="submit">Guardar</button>
                    <button type="reset">Cancelar</button>
                </div>

            </form>
        </div>

        <div class="card">
            <h2>Lista de Grupos</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Materia</th>
                        <th>Maestro</th>
                        <th>Periodo</th>
                        <th>Límite</th>
                        <th>Horario</th>
                        <th>Aula</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                  
                </tbody>
            </table>
        </div>

    </main>

</div>

</body>
</html>
