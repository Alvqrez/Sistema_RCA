<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Grupos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="layout">

    <!-- SIDEBAR -->
    <aside class="sidebar"></aside>

    <main class="content">

        <h1>Grupos</h1>

        <div class="card">
            <h2>Registrar Grupo</h2>

            <form class="form-grid">

                <h3 class="section-title">Datos del grupo</h3>

                <div>
                    <label>ID Grupo</label>
                    <input type="text">
                </div>

                <div>
                    <label>Materia</label>
                    <input type="text">
                </div>

                <div>
                    <label>Maestro</label>
                    <input type="text">
                </div>

                <div>
                    <label>Periodo</label>
                    <input type="text">
                </div>

                <div>
                    <label>Límite de alumnos</label>
                    <input type="number">
                </div>

                <div>
                    <label>Horario</label>
                    <input type="text">
                </div>

                <div>
                    <label>Aula</label>
                    <input type="text">
                </div>

                <h3 class="section-title">Unidad</h3>

                <div>
                    <label>ID Unidad</label>
                    <input type="text">
                </div>

                <div>
                    <label>ID Grupo</label>
                    <input type="text">
                </div>

                <div>
                    <label>Número de unidades</label>
                    <input type="number">
                </div>

                <div>
                    <label>Nombre de unidad</label>
                    <input type="text">
                </div>

                <div>
                    <label>Temario</label>
                    <input type="text">
                </div>

                <div>
                    <label>Estatus</label>
                    <select>
                        <option>Activo</option>
                        <option>Inactivo</option>
                    </select>
                </div>

                <div>
                    <label>Fecha de cierre</label>
                    <input type="date">
                </div>

                <div class="botones">
                    <button type="submit">Guardar</button>
                    <button type="reset">Cancelar</button>
                </div>

            </form>
        </div>

        <div class="card">
            <h2>Lista de Grupos</h2>

            <table>
                <thead>
                    <tr>
                        <th>ID Grupo</th>
                        <th>Materia</th>
                        <th>Maestro</th>
                        <th>Periodo</th>
                        <th>Aula</th>
                        <th>Unidades</th>
                        <th>Estatus</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                
                </tbody>
            </table>

        </div>

    </main>

</div>
<script src="../js/sidebar.js"></script>
</body>
</html>
