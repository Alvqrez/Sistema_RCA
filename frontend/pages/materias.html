<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Materias - RCA</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<div class="layout">

    <!-- MENU -->
    <aside class="sidebar">
        <h2>RCA</h2>
        <nav>
            <a href="alumnos.html">Alumnos</a>
            <a href="materias.html" class="active">Materias</a>
            <a href="calificaciones.html">Calificaciones</a>
        </nav>
    </aside>

    <!-- CONTENIDO -->
    <main class="content">

        <h1>Materias</h1>

        <!-- FORMULARIO -->
        <div class="card">
            <h2>Registrar Materia</h2>

            <form id="formMateria">

                <div class="form-group">
                    <label>Nombre de la materia</label>
                    <input type="text" id="nombreMateria" required>
                </div>

                <div class="form-group">
                    <label>Clave</label>
                    <input type="text" id="claveMateria" placeholder="Ej: ISC-101">
                </div>

                <div class="form-group">
                    <label>Créditos</label>
                    <input type="number" id="creditos" min="0">
                </div>

                <button type="submit">Guardar</button>
                <button type="button" onclick="cancelarEdicion()">Cancelar</button>

                <p id="mensajeMateria"></p>

            </form>
        </div>

        <!-- TABLA -->
        <div class="card">
            <h2>Lista de Materias</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Clave</th>
                        <th>Créditos</th>
                        <th>Acciones</th>
                    </tr>
                </thead>

                <tbody id="tablaMaterias"></tbody>
            </table>
        </div>

    </main>

</div>

<script src="../js/materias.js"></script>

</body>
</html>
