<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Unidades — RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro")
        document.documentElement.classList.add("dark-mode");
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link rel="icon" type="image/png" href="../assets/images/icons/rca-icon.png" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      /* ── Selector de materia ─────────────────────────── */
      .materia-selector {
        display: flex;
        align-items: flex-end;
        gap: 14px;
        flex-wrap: wrap;
      }
      .materia-selector .field-group { flex: 1; min-width: 240px; margin: 0; }

      /* ── Card de configuración ───────────────────────── */
      #cardConfigUnidades { display: none; margin-top: 20px; }
      #cardResumen        { display: none; margin-top: 20px; }

      .unidades-grid { display: grid; gap: 10px; }
      .unidad-numero {
        width: 38px; height: 38px;
        border-radius: 50%;
        background: var(--primary, #3b82f6);
        color: #fff;
        font-weight: 700;
        font-size: .9rem;
        display: flex; align-items: center; justify-content: center;
        flex-shrink: 0;
      }
      .unidad-input {
        width: 100%;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 7px;
        background: var(--card-bg);
        color: var(--text-primary);
        font-size: .9rem;
        box-sizing: border-box;
        font-family: inherit;
      }
      .unidad-input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59,130,246,.15);
      }

      /* ── Chip de info ────────────────────────────────── */
      .chip-info {
        display: inline-flex; align-items: center; gap: 6px;
        padding: 4px 12px; border-radius: 999px;
        font-size: .78rem; font-weight: 600;
        background: var(--info-light, #eff6ff);
        color: var(--info-text, #1d4ed8);
        border: 1px solid var(--info-border, #bfdbfe);
      }

      /* ── Tabla resumen ───────────────────────────────── */
      .resumen-tabla { width: 100%; border-collapse: collapse; font-size: .88rem; }
      .resumen-tabla th {
        text-align: left; padding: 8px 12px;
        background: var(--bg-secondary);
        color: var(--text-secondary);
        font-size: .75rem; font-weight: 600;
        text-transform: uppercase; letter-spacing: .05em;
      }
      .resumen-tabla td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
      .resumen-tabla tr:last-child td { border-bottom: none; }
      .badge-ok  { background:#d1fae5; color:#065f46; padding:2px 10px; border-radius:999px; font-size:.75rem; font-weight:700; }
      .badge-pnd { background:#fef3c7; color:#92400e; padding:2px 10px; border-radius:999px; font-size:.75rem; font-weight:700; }
    
      /* ── Unidad row: solo número + input grande ─────────── */
      .unidad-row {
        display: grid;
        grid-template-columns: 44px 1fr;
        align-items: center;
        gap: 12px;
        padding: 10px 14px;
        background: var(--bg-secondary);
        border: 1px solid var(--border);
        border-radius: 9px;
        transition: border-color .2s, background .2s;
      }
      .unidad-row:focus-within {
        border-color: var(--primary);
        background: var(--card-bg);
      }

      /* ── Bloque de opciones (nivel materia) ─────────────── */
      .bloque-opciones {
        padding: 14px 16px;
        background: var(--bg-secondary);
        border: 1.5px solid var(--border);
        border-radius: 10px;
        margin-bottom: 14px;
      }
      .opciones-label {
        font-size: .78rem; font-weight: 700;
        text-transform: uppercase; letter-spacing: .05em;
        color: var(--text-secondary); margin-bottom: 10px;
      }
      .opciones-sublabel {
        font-weight: 400; text-transform: none; letter-spacing: 0;
        color: var(--text-muted); font-size: .72rem;
      }
      .tipos-chips {
        display: flex; flex-wrap: wrap; gap: 7px; margin-bottom: 8px;
      }
      .tipo-chip-toggle {
        padding: 5px 14px;
        border: 1.5px solid var(--border);
        border-radius: 999px;
        background: var(--card-bg);
        color: var(--text-secondary);
        font-size: .8rem; font-weight: 600;
        cursor: pointer;
        transition: all .15s;
        font-family: inherit;
      }
      .tipo-chip-toggle:hover {
        border-color: var(--primary);
        color: var(--primary);
        background: var(--primary-light, #eff6ff);
      }
      .tipo-chip-toggle.activo {
        background: var(--primary, #3b82f6);
        border-color: var(--primary, #3b82f6);
        color: #fff;
      }
      .opciones-hint {
        font-size: .75rem; color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>
      <main class="content">

        <!-- Encabezado -->
        <div class="page-header-v2">
          <div>
            <h1>Unidades académicas</h1>
            <p class="page-subtitle">Configura los nombres de las unidades de cada materia</p>
          </div>
        </div>

        <!-- ① Seleccionar materia -->
        <div class="card" style="margin-bottom:0">
          <div class="card-title" style="padding-bottom:0">
            <iconify-icon icon="lucide:book-open"></iconify-icon>
            Selecciona una materia
          </div>
          <div class="card-body">
            <div class="materia-selector">
              <div class="field-group">
                <label>Materia</label>
                <select id="selMateria">
                  <option value="">— Selecciona una materia —</option>
                </select>
              </div>
              <button class="btn btn-primary" onclick="cargarConfiguracion()">
                <iconify-icon icon="lucide:settings-2"></iconify-icon>
                Configurar unidades
              </button>
            </div>
            <div id="infoMateria" style="display:none;margin-top:12px">
              <span class="chip-info">
                <iconify-icon icon="lucide:info"></iconify-icon>
                <span id="textoInfoMateria"></span>
              </span>
            </div>
          </div>
        </div>

        <!-- ② Configurar nombres -->
        <div class="card" id="cardConfigUnidades">
          <div class="card-title">
            <iconify-icon icon="lucide:edit-3"></iconify-icon>
            <span id="tituloConfig">Configurar unidades</span>
          </div>
          <div class="card-body">
            <p id="instruccionesConfig" style="font-size:.84rem;color:var(--text-muted);margin-bottom:16px"></p>
            <div class="unidades-grid" id="gridUnidades"></div>
            <div style="margin-top:18px;display:flex;gap:10px;align-items:center">
              <button class="btn btn-primary" id="btnGuardar" onclick="guardarUnidades()">
                <iconify-icon icon="mdi:content-save-outline"></iconify-icon>
                Guardar unidades
              </button>

              <span id="estadoGuardado" style="font-size:.82rem;color:var(--success,#16a34a)"></span>
            </div>
          </div>
        </div>

        <!-- ③ Resumen -->
        <div class="card" id="cardResumen">
          <div class="card-title">
            <iconify-icon icon="mdi:table"></iconify-icon>
            Unidades registradas
          </div>
          <div class="card-body" style="padding-top:0">
            <table class="resumen-tabla">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Materia</th>
                  <th>Nombre de la unidad</th>
                  <th>Tipos habilitados para el maestro</th>
                </tr>
              </thead>
              <tbody id="cuerpoResumen"></tbody>
            </table>
          </div>
        </div>

      </main>
    </div>

    <div id="toast-container"></div>
    <script src="../js/sidebar.js"></script>
    <script src="../js/unidades.js"></script>
  </body>
</html>
