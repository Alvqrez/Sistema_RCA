<!-- frontend/pages/admin.html -->
<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Administrador - RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar" id="sidebar"></aside>

      <main class="content">
        <h1>Panel de Administración</h1>

        <div class="card">
          <h2>Crear usuario</h2>
          <form id="formUsuario" class="form-grid">
            <div>
              <label>Username</label>
              <input type="text" id="uUsername" required />
            </div>
            <div>
              <label>Contraseña</label>
              <input type="password" id="uPassword" required />
            </div>
            <div>
              <label>Rol</label>
              <select id="uRol">
                <option value="alumno">Alumno</option>
                <option value="maestro">Maestro</option>
                <option value="administrador">Administrador</option>
              </select>
            </div>
            <div>
              <label>ID de referencia (matrícula / num. empleado)</label>
              <input type="text" id="uReferencia" required />
            </div>
            <div class="botones">
              <button type="submit">Crear usuario</button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Usuarios del sistema</h2>
          <table>
            <thead>
              <tr>
                <th>Username</th>
                <th>Rol</th>
                <th>Referencia</th>
                <th>Último acceso</th>
                <th>Estatus</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaUsuarios"></tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="../js/admin.js"></script>
  </body>
</html>
