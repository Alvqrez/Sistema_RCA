<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Calificaciones - RCA</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<div class="layout">
    <aside class="sidebar"></aside>

    <main class="content">
        <h1>Calificaciones</h1>

        <div class="card">
            <h2>Registrar Calificación de Unidad</h2>
            <form id="formCalificacion" class="form-grid">

                <div>
                    <label>Matrícula del alumno</label>
                    <input type="text" id="matricula" placeholder="Ej. 20231001" required>
                </div>

                <div>
                    <label>ID Grupo</label>
                    <input type="number" id="idGrupo" required>
                </div>

                <div>
                    <label>ID Unidad</label>
                    <input type="number" id="idUnidad" required>
                </div>

                <div>
                    <label>Calificación (0–100)</label>
                    <input type="number" id="calificacion" min="0" max="100" step="0.01" required>
                </div>

                <div class="botones">
                    <button type="submit" class="btn-guardar">Guardar</button>
                    <button type="reset"  class="btn-cancelar">Cancelar</button>
                </div>

            </form>
        </div>

        <div class="card">
            <h2>Lista de Calificaciones</h2>
            <table>
                <thead>
                    <tr>
                        <th>Matrícula</th>
                        <th>Alumno</th>
                        <th>Unidad</th>
                        <th>Grupo</th>
                        <th>Promedio</th>
                        <th>Calificación final</th>
                        <th>Estatus</th>
                    </tr>
                </thead>
                <tbody id="tablaCalificaciones"></tbody>
            </table>
        </div>

    </main>
</div>

<script src="../js/sidebar.js"></script>
<script src="../js/calificaciones.js"></script>
</body>
</html>
