<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Calificaciones - RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>

      <main class="content">
        <h1>Calificaciones</h1>

        <div class="card">
          <h2>Registrar Calificación de Unidad</h2>
          <form id="formCalificacion" class="form-grid">
            <div>
              <label>No. Control del alumno</label>
              <input
                type="text"
                id="no_control"
                placeholder="Ej. 20231001"
                required
              />
            </div>

            <div>
              <label>ID Grupo</label>
              <input type="number" id="idGrupo" required />
            </div>

            <div>
              <label>ID Unidad</label>
              <input type="number" id="idUnidad" required />
            </div>

            <div>
              <label>Calificación (0–100)</label>
              <input
                type="number"
                id="calificacion"
                min="0"
                max="100"
                step="0.01"
                required
              />
            </div>

            <div class="botones">
              <button type="submit" class="btn btn-primary">
                <iconify-icon icon="mdi:content-save-outline"></iconify-icon>
                Guardar
              </button>
              <button class="btn btn-outline" ...>
                <iconify-icon icon="mdi:close"></iconify-icon> Cancelar
              </button>
            </div>
          </form>
        </div>

        <div class="card">
          <h2>Lista de Calificaciones</h2>
          <table>
            <thead>
              <tr>
                <th>No. Control</th>
                <th>Alumno</th>
                <th>Unidad</th>
                <th>Grupo</th>
                <th>Promedio</th>
                <th>Calificación final</th>
                <th>Estatus</th>
              </tr>
            </thead>
            <tbody id="tablaCalificaciones"></tbody>
          </table>
        </div>
      </main>
    </div>

    <script src="../js/sidebar.js"></script>
    <script src="../js/calificaciones.js"></script>
  </body>
</html>
