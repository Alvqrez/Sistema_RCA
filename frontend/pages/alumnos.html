<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Alumnos</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>

<body>

    <div class="layout">

        <aside class="sidebar">
            <h2>RCA</h2>

            <nav>
                <a href="alumnos.html" class="active">Alumnos</a>
                <a href="materias.html">Materias</a>
                <a href="calificaciones.html">Calificaciones</a>
            </nav>

        </aside>

        <main class="content">

            <h1>Alumnos</h1>

            <div class="card">

                <h2>Registrar alumno</h2>

                <form id="formAlumno" class="form-grid">

                    <div>
                        <label>Número de control</label>
                        <input type="text" id="matricula" required>
                    </div>

                    <div>
                        <label>Carrera</label>
                        <input type="text" id="carrera" required>
                    </div>

                    <div>
                        <label>Correo institucional</label>
                        <input type="email" id="correo" required>   
                    </div>

                    <h3 class="section-title">Datos del alumno</h3>

                    <div>
                        <label>Nombre(s)</label>
                        <input type="text" id="nombre">
                    </div>

                    <div>
                        <label>Apellido paterno</label>
                        <input type="text" id="apellidoPaterno">
                    </div>

                    <div>
                        <label>Apellido materno</label>
                        <input type="text" id="apellidoMaterno">
                    </div>

                    <div>
                        <label>CURP</label>
                        <input type="text" id="curp">
                    </div>

                    <div>
                        <label>Fecha de nacimiento</label>
                        <input type="date" id="fechaNacimiento">
                    </div>

                    <div>
                        <label>Género</label>
                        <select id="genero">
                            <option value="">Seleccionar</option>
                            <option>Masculino</option>
                            <option>Femenino</option>
                            <option>Otro</option>
                        </select>
                    </div>

                    <div>
                        <label>Dirección</label>
                        <input type="text" id="direccion">
                    </div>

                    <div>
                        <label>Teléfono celular</label>
                        <input type="text" id="celular">
                    </div>

                    <div>
                        <label>Teléfono de casa</label>
                        <input type="text" id="telefonoCasa">
                    </div>

                    <div>
                        <label>Correo personal</label>
                        <input type="email" id="correoPersonal">
                    </div>

                    <!-- BOTONES -->
                    <div class="botones">
                        <button type="submit">Guardar</button>
                        <button type="reset">Cancelar</button>
                    </div>

                </form>

            </div>

            <div class="card">

                <h2>Lista de alumnos</h2>

                <table>

                    <thead>
                        <tr>
                            <th>No. Control</th>
                            <th>Nombre</th>
                            <th>Carrera</th>
                            <th>Correo</th>
                            <th>Teléfono</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>

                    <tbody id="tablaAlumnos"></tbody>

                </table>

            </div>

        </main>

    </div>

    <script src="../js/api.js"></script>

</body>

</html>
