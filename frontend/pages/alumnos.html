<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Alumnos</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro") {
        document.documentElement.classList.add("dark-mode");
      }
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
  </head>

  <body>
    <div class="layout">
      <aside class="sidebar"></aside>

      <main class="content">
        <h1>Alumnos</h1>

        <div class="card" id="cardRegistroAlumno">
          <h2 id="tituloFormAlumno">Registrar alumno</h2>

          <form id="formAlumno" class="form-grid">
            <div>
              <label>Número de control</label>
              <input type="text" id="matricula" required />
            </div>

            <div>
              <label>Carrera</label>
              <select id="carrera" required>
                <option value="">-- Selecciona una carrera --</option>
              </select>
            </div>

            <div>
              <label>Correo institucional</label>
              <input type="email" id="correo" required />
            </div>

            <h3 class="section-title">Datos del alumno</h3>

            <div>
              <label>Nombre(s)</label>
              <input type="text" id="nombre" />
            </div>

            <div>
              <label>Apellido paterno</label>
              <input type="text" id="apellidoPaterno" />
            </div>

            <div>
              <label>Apellido materno</label>
              <input type="text" id="apellidoMaterno" />
            </div>

            <div>
              <label>CURP</label>
              <input type="text" id="curp" />
            </div>

            <div>
              <label>Fecha de nacimiento</label>
              <input type="date" id="fechaNacimiento" />
            </div>

            <div>
              <label>Género</label>
              <select id="genero">
                <option value="">Seleccionar</option>
                <option>Masculino</option>
                <option>Femenino</option>
                <option>Otro</option>
              </select>
            </div>

            <div>
              <label>Dirección</label>
              <input type="text" id="direccion" />
            </div>

            <div>
              <label>Teléfono celular</label>
              <input type="text" id="celular" />
            </div>

            <div>
              <label>Teléfono de casa</label>
              <input type="text" id="telefonoCasa" />
            </div>

            <div>
              <label>Correo personal</label>
              <input type="email" id="correoPersonal" />
            </div>

            <h3 class="section-title" id="seccionAcceso">Acceso al sistema</h3>

            <div>
              <label>Usuario (login)</label>
              <input type="text" id="username" required />
            </div>

            <div>
              <label>Contraseña inicial</label>
              <input type="password" id="password" required />
            </div>
            <!-- BOTONES -->
            <div class="botones">
              <button type="submit" class="btn-guardar">Guardar</button>
              <button type="reset" class="btn-cancelar">Cancelar</button>
            </div>
            <p id="formMensaje"></p>
          </form>
        </div>

        <div class="card" id="cardRegistroAlumno">
          <h2>Lista de alumnos</h2>

          <div class="table-filters">
            <input
              type="text"
              id="filtroBusqueda"
              placeholder="🔍 Buscar por nombre o matrícula..."
            />
            <select id="filtroCarrera">
              <option value="">Todas las carreras</option>
            </select>
          </div>

          <table>
            <thead>
              <tr>
                <th>No. Control</th>
                <th>Nombre</th>
                <th>Carrera</th>
                <th>Correo</th>
                <th>Teléfono</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="tablaAlumnos"></tbody>
          </table>
        </div>
      </main>
    </div>
    <script src="../js/sidebar.js"></script>
    <script src="../js/carreras.js"></script>
    <script src="../js/api.js"></script>
  </body>
</html>
