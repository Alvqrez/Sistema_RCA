<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Iniciar Sesión</title>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --cyan: #2563eb;
        --cyan-dark: #1e3a8a;
        --navy: #0a1f3d;
        --navy-mid: #0d2647;
        --navy-lt: #122f56;
        --gold: #f5a623;
        --white: #ffffff;
        --gray-100: #f1f5f9;
        --gray-300: #cbd5e1;
        --gray-500: #64748b;
        --gray-700: #334155;
        --radius: 12px;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--navy);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow: hidden;
        position: relative;
      }

      /* Fondo decorativo con círculos */
      body::before,
      body::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        pointer-events: none;
      }
      body::before {
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(37, 99, 235, 0.18) 0%,
          transparent 70%
        );
        top: -200px;
        left: -150px;
      }
      body::after {
        width: 500px;
        height: 500px;
        background: radial-gradient(
          circle,
          rgba(26, 58, 110, 0.4) 0%,
          transparent 70%
        );
        bottom: -150px;
        right: -100px;
      }

      .login-wrapper {
        display: grid;
        grid-template-columns: 1fr 1fr;
        width: 100%;
        max-width: 900px;
        min-height: 560px;
        border-radius: 20px;
        overflow: hidden;
        box-shadow: var(--shadow);
        position: relative;
        z-index: 1;
      }

      /* Panel izquierdo — institucional */
      .panel-left {
        background: linear-gradient(
          145deg,
          var(--navy-mid) 0%,
          var(--navy-lt) 100%
        );
        padding: 48px 40px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        position: relative;
        overflow: hidden;
      }
      /* ── Burbujas animadas ───────────────────────────────── */
      .bubbles {
        position: absolute;
        inset: 0;
        overflow: hidden;
        pointer-events: none;
        z-index: 0;
      }
      .bubble {
        position: absolute;
        bottom: -80px;
        border-radius: 50%;
        background: rgba(37, 99, 235, 0.18);
        animation: rise linear infinite;
      }

      @keyframes rise {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        10% {
          opacity: 1;
        }
        90% {
          opacity: 0.6;
        }
        100% {
          transform: translateY(-110vh) scale(1.1);
          opacity: 0;
        }
      }

      .bubble:nth-child(1) {
        width: 28px;
        height: 28px;
        left: 8%;
        animation-duration: 9s;
        animation-delay: 0s;
      }
      .bubble:nth-child(2) {
        width: 18px;
        height: 18px;
        left: 22%;
        animation-duration: 12s;
        animation-delay: 2s;
      }
      .bubble:nth-child(3) {
        width: 40px;
        height: 40px;
        left: 38%;
        animation-duration: 10s;
        animation-delay: 1s;
      }
      .bubble:nth-child(4) {
        width: 14px;
        height: 14px;
        left: 55%;
        animation-duration: 8s;
        animation-delay: 4s;
      }
      .bubble:nth-child(5) {
        width: 32px;
        height: 32px;
        left: 70%;
        animation-duration: 11s;
        animation-delay: 0.5s;
      }
      .bubble:nth-child(6) {
        width: 22px;
        height: 22px;
        left: 15%;
        animation-duration: 13s;
        animation-delay: 6s;
      }
      .bubble:nth-child(7) {
        width: 50px;
        height: 50px;
        left: 45%;
        animation-duration: 14s;
        animation-delay: 3s;
      }
      .bubble:nth-child(8) {
        width: 16px;
        height: 16px;
        left: 80%;
        animation-duration: 9s;
        animation-delay: 7s;
      }
      .bubble:nth-child(9) {
        width: 36px;
        height: 36px;
        left: 28%;
        animation-duration: 10s;
        animation-delay: 5s;
      }
      .bubble:nth-child(10) {
        width: 20px;
        height: 20px;
        left: 62%;
        animation-duration: 12s;
        animation-delay: 1.5s;
      }

      .inst-logo {
        display: flex;
        align-items: center;
        gap: 14px;
        position: relative;
        z-index: 1;
      }
      .inst-icon {
        position: relative;
        width: 52px;
        height: 52px;
        border-radius: 12px;
        background: white;

        display: flex;
        align-items: center;
        justify-content: center;

        z-index: 2;
      }

      /* Imagen */
      .inst-icon img {
        width: 85%;
        height: 85%;
        object-fit: contain;
      }

      /* Glow */
      .inst-icon::after {
        content: "";
        position: absolute;

        width: 120%;
        height: 120%;

        top: 50%;
        left: 50%;

        transform: translate(-50%, -50%);

        background: radial-gradient(
          circle,
          rgba(255, 255, 255, 0.8) 0%,
          rgba(255, 255, 255, 0.4) 40%,
          rgba(255, 255, 255, 0) 70%
        );

        filter: blur(12px);

        z-index: -1;
      }

      .inst-text .inst-name {
        font-size: 0.72rem;
        font-weight: 600;
        color: var(--gray-300);
        letter-spacing: 0.06em;
        text-transform: uppercase;
        line-height: 1.2;
      }
      .inst-text .inst-short {
        font-size: 1.1rem;
        font-weight: 700;
        color: var(--white);
        letter-spacing: 0.02em;
      }

      .panel-left-main {
        position: relative;
        z-index: 1;
      }
      .rca-title {
        font-size: 3.8rem;
        font-weight: 800;
        color: var(--white);
        letter-spacing: -0.03em;
        line-height: 1;
        margin-bottom: 12px;
      }
      .rca-title span {
        color: var(--cyan);
      }
      .rca-subtitle {
        font-size: 0.92rem;
        color: var(--gray-300);
        line-height: 1.6;
        max-width: 280px;
      }

      .features-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        position: relative;
        z-index: 1;
      }
      .feature-item {
        display: flex;
        align-items: center;
        gap: 10px;
        font-size: 0.8rem;
        color: var(--gray-300);
      }
      .feature-dot {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.08);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 0.9rem;
        flex-shrink: 0;
      }

      /* Panel derecho — formulario */
      .panel-right {
        background: var(--white);
        padding: 48px 44px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .form-title {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--navy);
        margin-bottom: 6px;
      }
      .form-subtitle {
        font-size: 0.85rem;
        color: var(--gray-500);
        margin-bottom: 28px;
      }

      /* Selector de rol */
      .rol-selector {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 24px;
      }
      .rol-btn {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
        padding: 10px 6px;
        border-radius: 10px;
        border: 2px solid var(--gray-300);
        background: transparent;
        cursor: pointer;
        transition: all 0.2s;
        color: var(--gray-500);
        font-family: "Inter", sans-serif;
        font-size: 0.72rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .rol-btn iconify-icon {
        font-size: 1.3rem;
      }
      .rol-btn:hover {
        border-color: var(--navy-lt);
        color: var(--navy);
        background: var(--gray-100);
      }
      .rol-btn.active {
        border-color: var(--cyan);
        color: var(--cyan);
        background: rgba(37, 99, 235, 0.08);
      }

      /* Inputs */
      .input-field {
        margin-bottom: 16px;
        position: relative;
      }
      .input-field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 600;
        color: var(--gray-700);
        margin-bottom: 6px;
        letter-spacing: 0.03em;
      }
      .input-wrap {
        position: relative;
        display: flex;
        align-items: center;
      }
      .input-icon {
        position: absolute;
        left: 14px;
        color: var(--gray-500);
        font-size: 1rem;
        pointer-events: none;
        display: flex;
      }
      .input-field input {
        width: 100%;
        padding: 12px 14px 12px 40px;
        border: 2px solid var(--gray-300);
        border-radius: 10px;
        font-family: "Inter", sans-serif;
        font-size: 0.9rem;
        color: var(--navy);
        transition:
          border-color 0.2s,
          box-shadow 0.2s;
        outline: none;
        background: var(--gray-100);
      }
      .input-field input:focus {
        border-color: var(--cyan);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }
      .btn-toggle-pass {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        color: var(--gray-500);
        font-size: 1rem;
        padding: 4px;
        border-radius: 6px;
        display: flex;
        transition: color 0.2s;
      }
      .btn-toggle-pass:hover {
        color: var(--navy);
      }

      /* Botón submit */
      .btn-submit {
        width: 100%;
        padding: 13px;
        background: linear-gradient(
          135deg,
          var(--cyan) 0%,
          var(--cyan-dark) 100%
        );
        color: white;
        border: none;
        border-radius: 10px;
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 6px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        letter-spacing: 0.02em;
      }
      .btn-submit:hover {
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(37, 99, 235, 0.4);
      }
      .btn-submit:active {
        transform: translateY(0);
      }
      .btn-submit.loading {
        opacity: 0.7;
        pointer-events: none;
      }

      /* Mensaje de error */
      .error-msg {
        margin-top: 12px;
        padding: 10px 14px;
        background: #fef2f2;
        border: 1px solid #fecaca;
        border-radius: 8px;
        color: #dc2626;
        font-size: 0.82rem;
        font-weight: 500;
        display: none;
        align-items: center;
        gap: 8px;
      }
      .error-msg.visible {
        display: flex;
      }

      /* Footer */
      .form-footer {
        margin-top: 24px;
        text-align: center;
        font-size: 0.75rem;
        color: var(--gray-500);
      }

      /* Responsive */
      @media (max-width: 680px) {
        .login-wrapper {
          grid-template-columns: 1fr;
          max-width: 420px;
        }
        .panel-left {
          display: none;
        }
        .panel-right {
          padding: 36px 28px;
        }
      }
    </style>
  </head>
  <body>
    <div class="login-wrapper">
      <!-- Panel izquierdo -->
      <div class="panel-left">
        <!-- Burbujas animadas -->
        <div class="bubbles">
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
          <div class="bubble"></div>
        </div>

        <div class="inst-logo">
          <div class="inst-icon">
            <img
              src="../assets/images/icons/logo-itv.png"
              alt="Instituto Tecnológico de Veracruz"
            />
          </div>
          <div class="inst-text">
            <div class="inst-name">Instituto Tecnológico de Veracruz</div>
            <div class="inst-short">TecNM · ITV</div>
          </div>
        </div>

        <div class="panel-left-main">
          <div class="rca-title">R<span>C</span>A</div>
          <p class="rca-subtitle">
            Sistema de Registro y Cálculo de Resultados Académicos
          </p>
        </div>
      </div>

      <!-- Panel derecho — formulario -->
      <div class="panel-right">
        <div class="form-title">Bienvenido</div>
        <div class="form-subtitle">
          Selecciona tu tipo de cuenta e inicia sesión
        </div>

        <!-- Selector de rol -->
        <div class="rol-selector">
          <button
            class="rol-btn active"
            data-rol="alumno"
            onclick="seleccionarRol(this)"
          >
            <iconify-icon icon="mdi:account-school"></iconify-icon>
            Alumno
          </button>
          <button
            class="rol-btn"
            data-rol="maestro"
            onclick="seleccionarRol(this)"
          >
            <iconify-icon icon="lucide:graduation-cap"></iconify-icon>
            Docente
          </button>
          <button
            class="rol-btn"
            data-rol="administrador"
            onclick="seleccionarRol(this)"
          >
            <iconify-icon icon="mdi:shield-account"></iconify-icon>
            Admin
          </button>
        </div>

        <!-- Formulario -->
        <form id="loginForm" onsubmit="iniciarSesion(event)">
          <input type="hidden" id="rolActual" value="alumno" />

          <div class="input-field">
            <label>Usuario</label>
            <div class="input-wrap">
              <span class="input-icon"
                ><iconify-icon icon="mdi:account-outline"></iconify-icon
              ></span>
              <input
                type="text"
                id="user"
                autocomplete="username"
                placeholder="Ingresa tu usuario"
                required
              />
            </div>
          </div>

          <div class="input-field">
            <label>Contraseña</label>
            <div class="input-wrap">
              <span class="input-icon"
                ><iconify-icon icon="mdi:lock-outline"></iconify-icon
              ></span>
              <input
                type="password"
                id="pass"
                autocomplete="current-password"
                placeholder="••••••••"
                required
              />
              <button
                type="button"
                class="btn-toggle-pass"
                onclick="togglePass()"
                id="btnTogglePass"
              >
                <iconify-icon
                  id="iconPass"
                  icon="mdi:eye-outline"
                ></iconify-icon>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-submit" id="btnSubmit">
            <iconify-icon icon="mdi:login"></iconify-icon>
            Iniciar sesión
          </button>

          <div class="error-msg" id="errorMsg">
            <iconify-icon icon="mdi:alert-circle-outline"></iconify-icon>
            <span id="errorTexto"></span>
          </div>
        </form>

        <div class="form-footer">&nbsp; &nbsp; Sistema RCA v1.1</div>
      </div>
    </div>

    <script>
      const BASE_URL = "http://localhost:3000";

      function seleccionarRol(btn) {
        document
          .querySelectorAll(".rol-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        document.getElementById("rolActual").value = btn.dataset.rol;
        // Limpiar campos al cambiar rol
        document.getElementById("user").value = "";
        document.getElementById("pass").value = "";
        ocultarError();
      }

      function togglePass() {
        const inp = document.getElementById("pass");
        const icon = document.getElementById("iconPass");
        const show = inp.type === "password";
        inp.type = show ? "text" : "password";
        icon.setAttribute(
          "icon",
          show ? "mdi:eye-off-outline" : "mdi:eye-outline",
        );
      }

      function mostrarError(msg) {
        const el = document.getElementById("errorMsg");
        document.getElementById("errorTexto").textContent = msg;
        el.classList.add("visible");
      }
      function ocultarError() {
        document.getElementById("errorMsg").classList.remove("visible");
      }

      async function iniciarSesion(e) {
        e.preventDefault();
        ocultarError();

        const username = document.getElementById("user").value.trim();
        const password = document.getElementById("pass").value;
        const rol = document.getElementById("rolActual").value;

        if (!username || !password) {
          mostrarError("Ingresa tu usuario y contraseña");
          return;
        }

        const btn = document.getElementById("btnSubmit");
        btn.classList.add("loading");
        btn.innerHTML = `<iconify-icon icon="mdi:loading" style="animation:spin 1s linear infinite"></iconify-icon> Verificando...`;

        try {
          const res = await fetch(`${BASE_URL}/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ username, password, rol }),
          });
          const data = await res.json();

          if (data.success) {
            localStorage.setItem("token", data.token);
            localStorage.setItem("nombre", data.nombre);
            localStorage.setItem("rol", data.rol);

            btn.innerHTML = `<iconify-icon icon="mdi:check-circle-outline"></iconify-icon> ¡Bienvenido!`;

            setTimeout(() => {
              if (data.rol === "alumno")
                window.location.href = "portalAlumno.html";
              else if (data.rol === "maestro")
                window.location.href = "mis_grupos.html";
              else if (data.rol === "administrador")
                window.location.href = "admin.html";
            }, 600);
          } else {
            mostrarError(data.message || "Usuario o contraseña incorrectos");
            btn.classList.remove("loading");
            btn.innerHTML = `<iconify-icon icon="mdi:login"></iconify-icon> Iniciar sesión`;
          }
        } catch {
          mostrarError(
            "No se pudo conectar con el servidor. Verifica que el sistema esté activo.",
          );
          btn.classList.remove("loading");
          btn.innerHTML = `<iconify-icon icon="mdi:login"></iconify-icon> Iniciar sesión`;
        }
      }

      // Animación del spinner
      const style = document.createElement("style");
      style.textContent = `@keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }`;
      document.head.appendChild(style);
    </script>
  </body>
</html>
