<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Historial de Asistencias — RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro")
        document.documentElement.classList.add("dark-mode");
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../css/styles.css" />
    <style>
      /* ── Tabla historial ── */
      .hist-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.85rem;
      }
      .hist-table th {
        background: var(--bg-app);
        color: var(--text-muted);
        font-size: 0.74rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        padding: 10px 12px;
        text-align: left;
        border-bottom: 2px solid var(--border);
        white-space: nowrap;
      }
      .hist-table td {
        padding: 10px 12px;
        border-bottom: 1px solid var(--border);
        color: var(--text-main);
        vertical-align: middle;
      }
      .hist-table tr:last-child td {
        border-bottom: none;
      }
      .hist-table tbody tr:hover td {
        background: var(--bg-app);
      }

      /* Celdas de fecha — compactas */
      .fecha-col {
        font-size: 0.75rem;
        color: var(--text-muted);
        white-space: nowrap;
      }

      /* Badge de estado */
      .est-presente {
        background: var(--success-light);
        color: var(--success);
      }
      .est-falta {
        background: var(--danger-light);
        color: var(--danger);
      }
      .est-sin {
        background: var(--border);
        color: var(--text-muted);
      }

      /* Barra de asistencia por alumno */
      .pct-bar-wrap {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 120px;
      }
      .pct-bar-track {
        flex: 1;
        height: 6px;
        background: var(--border);
        border-radius: 99px;
        overflow: hidden;
      }
      .pct-bar-fill {
        height: 100%;
        border-radius: 99px;
        transition: width 0.4s ease;
      }
      .pct-num {
        font-size: 0.8rem;
        font-weight: 700;
        min-width: 36px;
        text-align: right;
      }

      /* Chips de resumen por fecha */
      .fecha-summary {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.75rem;
        font-weight: 600;
      }

      /* Vista tabular de fechas (grid) */
      .grid-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.78rem;
        table-layout: auto;
      }
      .grid-table th {
        background: var(--bg-app);
        color: var(--text-muted);
        font-size: 0.72rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        padding: 8px 10px;
        border-bottom: 2px solid var(--border);
        white-space: nowrap;
      }
      .grid-table td {
        padding: 8px 10px;
        border-bottom: 1px solid var(--border);
        color: var(--text-main);
      }
      .grid-table tr:last-child td {
        border-bottom: none;
      }
      .grid-table tbody tr:hover td {
        background: var(--bg-app);
      }

      .cell-p {
        text-align: center;
        font-size: 1rem;
        color: var(--success);
      }
      .cell-f {
        text-align: center;
        font-size: 1rem;
        color: var(--danger);
      }
      .cell-n {
        text-align: center;
        font-size: 1rem;
        color: var(--border);
      }

      /* Tabs de vista */
      .vista-tabs {
        display: flex;
        gap: 8px;
        margin-bottom: 18px;
      }
      .vista-tab {
        padding: 7px 18px;
        border: 1.5px solid var(--border);
        border-radius: 20px;
        font-size: 0.82rem;
        font-weight: 600;
        cursor: pointer;
        background: var(--bg-app);
        color: var(--text-muted);
        font-family: "Inter", sans-serif;
        transition: all 0.15s;
      }
      .vista-tab.active {
        background: var(--primary);
        border-color: var(--primary);
        color: #fff;
      }
      .vista-tab:hover:not(.active) {
        border-color: var(--primary);
        color: var(--primary);
      }

      @media print {
        .sidebar,
        .page-header-v2 button,
        .header-actions,
        .vista-tabs,
        .card-filter-bar,
        .btn {
          display: none !important;
        }
        .content {
          margin-left: 0 !important;
          width: 100% !important;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>
      <main class="content">
        <!-- Header -->
        <div class="page-header-v2">
          <div>
            <h1 style="display: flex; align-items: center; gap: 10px">
              <iconify-icon
                icon="lucide:calendar-clock"
                style="color: var(--primary)"
              ></iconify-icon>
              Historial de Asistencias
            </h1>
            <p class="page-subtitle">
              Consulta el registro acumulado por grupo
            </p>
          </div>
          <div class="header-actions">
            <a
              href="asistencia.html"
              class="btn btn-outline"
              style="text-decoration: none"
            >
              <iconify-icon icon="lucide:arrow-left"></iconify-icon> Tomar lista
            </a>
            <button class="btn btn-outline" onclick="exportarCSV()">
              <iconify-icon icon="lucide:download"></iconify-icon> Exportar CSV
            </button>
            <button class="btn btn-outline" onclick="window.print()">
              <iconify-icon icon="lucide:printer"></iconify-icon> Imprimir
            </button>
          </div>
        </div>

        <!-- Selector de grupo -->
        <div class="card" style="padding: 16px 20px; margin-bottom: 18px">
          <div
            style="
              display: flex;
              gap: 14px;
              flex-wrap: wrap;
              align-items: flex-end;
            "
          >
            <div
              class="form-group"
              style="margin: 0; flex: 1; min-width: 200px"
            >
              <label>Grupo</label>
              <select id="selGrupo" onchange="cargarHistorial()">
                <option value="">— Selecciona un grupo —</option>
              </select>
            </div>
            <div class="form-group" style="margin: 0">
              <label>Desde</label>
              <input
                type="date"
                id="fechaDesde"
                onchange="aplicarFiltroFechas()"
              />
            </div>
            <div class="form-group" style="margin: 0">
              <label>Hasta</label>
              <input
                type="date"
                id="fechaHasta"
                onchange="aplicarFiltroFechas()"
              />
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div
          id="statsRow"
          class="stats-row"
          style="display: none; margin-bottom: 18px"
        >
          <div class="stat-card stat-success">
            <iconify-icon icon="lucide:calendar-check"></iconify-icon>
            <div>
              <p id="stClases">—</p>
              <span>Clases registradas</span>
            </div>
          </div>
          <div class="stat-card">
            <iconify-icon icon="lucide:users"></iconify-icon>
            <div>
              <p id="stAlumnos">—</p>
              <span>Alumnos</span>
            </div>
          </div>
          <div class="stat-card stat-success">
            <iconify-icon icon="lucide:user-check"></iconify-icon>
            <div>
              <p id="stPctGrupo">—</p>
              <span>Asistencia promedio</span>
            </div>
          </div>
          <div class="stat-card stat-danger">
            <iconify-icon icon="lucide:user-x"></iconify-icon>
            <div>
              <p id="stAlRiesgo">—</p>
              <span>Alumnos en riesgo (&lt;80%)</span>
            </div>
          </div>
        </div>

        <!-- Tabs de vista -->
        <div class="vista-tabs" id="vistaTabs" style="display: none">
          <button
            class="vista-tab active"
            onclick="cambiarVista('resumen', this)"
          >
            <iconify-icon icon="lucide:layout-list"></iconify-icon> Resumen por
            alumno
          </button>
          <button class="vista-tab" onclick="cambiarVista('grid', this)">
            <iconify-icon icon="lucide:table"></iconify-icon> Tabla de fechas
          </button>
          <button class="vista-tab" onclick="cambiarVista('faltas', this)">
            <iconify-icon icon="lucide:alert-triangle"></iconify-icon> Solo
            faltas
          </button>
        </div>

        <!-- Contenido principal -->
        <div id="mainContent">
          <div class="empty-state" id="emptyState">
            <iconify-icon icon="lucide:calendar-search"></iconify-icon>
            <p>Selecciona un grupo para ver el historial de asistencias.</p>
          </div>
        </div>
      </main>
    </div>

    <div id="toast-container"></div>
    <script src="../js/sidebar.js"></script>
    <script>
      const BASE = "http://localhost:3000";
      const tkn = () => localStorage.getItem("token");
      const STORE = (key) => `asist_${key}`;

      let grupoActual = null;
      let alumnosGrupo = [];
      let todasFechas = []; // ordenadas
      let vistaActual = "resumen";

      soloPermitido("maestro", "administrador");

      // ── Init ──────────────────────────────────────────────────────
      (async function init() {
        await cargarGrupos();
        // Restaurar último grupo de asistencia.html
        const ug = localStorage.getItem("asist_ultimo_grupo");
        if (ug) {
          const sel = document.getElementById("selGrupo");
          if ([...sel.options].some((o) => o.value === ug)) {
            sel.value = ug;
            await cargarHistorial();
          }
        }
      })();

      async function cargarGrupos() {
        let grupos = [];
        try {
          const r = await fetch(`${BASE}/api/grupos/mis-grupos`, {
            headers: { Authorization: `Bearer ${tkn()}` },
          });
          if (r.ok) grupos = await r.json();
        } catch (_) {}
        if (!grupos.length) {
          try {
            const r2 = await fetch(`${BASE}/api/grupos`, {
              headers: { Authorization: `Bearer ${tkn()}` },
            });
            grupos = await r2.json();
          } catch (_) {}
        }
        const sel = document.getElementById("selGrupo");
        (grupos || []).forEach((g) => {
          sel.innerHTML += `<option value="${g.id_grupo}">${g.nombre_materia} — Grupo #${g.id_grupo}</option>`;
        });
      }

      async function cargarHistorial() {
        grupoActual = document.getElementById("selGrupo").value;
        if (!grupoActual) {
          mostrarVacio();
          return;
        }
        localStorage.setItem("asist_ultimo_grupo", grupoActual);

        // Cargar lista de alumnos del grupo
        try {
          const r = await fetch(
            `${BASE}/api/inscripciones/grupo/${grupoActual}`,
            {
              headers: { Authorization: `Bearer ${tkn()}` },
            },
          );
          const data = await r.json();
          alumnosGrupo = (data || []).map((a) => ({
            matricula: a.matricula,
            nombre:
              `${a.apellido_paterno} ${a.apellido_materno ?? ""}, ${a.nombre}`.trim(),
          }));
        } catch (_) {
          alumnosGrupo = [];
        }

        construirFechas();
        aplicarFiltroFechas();
      }

      function construirFechas() {
        // Recopilar todas las fechas registradas en localStorage para este grupo
        const fechasSet = new Set();
        alumnosGrupo.forEach((a) => {
          const reg = getRegistro(a.matricula);
          Object.keys(reg).forEach((f) => fechasSet.add(f));
        });
        todasFechas = [...fechasSet].sort();
      }

      function aplicarFiltroFechas() {
        const desde = document.getElementById("fechaDesde").value;
        const hasta = document.getElementById("fechaHasta").value;
        const fechas = todasFechas.filter(
          (f) => (!desde || f >= desde) && (!hasta || f <= hasta),
        );
        renderVista(fechas);
      }

      function renderVista(fechas) {
        if (!alumnosGrupo.length && !fechas.length) {
          mostrarVacio();
          return;
        }

        document.getElementById("statsRow").style.display = "grid";
        document.getElementById("vistaTabs").style.display = "flex";
        document.getElementById("emptyState").style.display = "none";

        calcularStats(fechas);

        if (vistaActual === "resumen") renderResumen(fechas);
        else if (vistaActual === "grid") renderGrid(fechas);
        else renderFaltas(fechas);
      }

      function calcularStats(fechas) {
        document.getElementById("stClases").textContent = fechas.length;
        document.getElementById("stAlumnos").textContent = alumnosGrupo.length;

        let totalPct = 0,
          enRiesgo = 0;
        alumnosGrupo.forEach((a) => {
          const pct = getPct(a.matricula, fechas);
          if (pct !== null) {
            totalPct += pct;
            if (pct < 80) enRiesgo++;
          }
        });
        const promedio = alumnosGrupo.length
          ? Math.round(totalPct / alumnosGrupo.length)
          : 0;
        document.getElementById("stPctGrupo").textContent = promedio + "%";
        document.getElementById("stAlRiesgo").textContent = enRiesgo;
      }

      function renderResumen(fechas) {
        const rows = alumnosGrupo
          .map((a) => {
            const reg = getRegistro(a.matricula);
            const pres = fechas.filter((f) => reg[f] === "presente").length;
            const falt = fechas.filter((f) => reg[f] === "falta").length;
            const sinR = fechas.length - pres - falt;
            const pct = fechas.length
              ? Math.round((pres / fechas.length) * 100)
              : null;
            const color =
              pct === null
                ? "#94a3b8"
                : pct >= 80
                  ? "var(--success)"
                  : pct >= 60
                    ? "var(--warning)"
                    : "var(--danger)";
            const riesgo =
              pct !== null && pct < 80
                ? `<span class="badge badge-danger" style="font-size:0.68rem;margin-left:6px">RIESGO</span>`
                : "";

            return `<tr>
            <td style="font-weight:600">${a.nombre} ${riesgo}</td>
            <td style="font-size:0.78rem;color:var(--text-muted)">${a.matricula}</td>
            <td style="text-align:center;color:var(--success);font-weight:600">${pres}</td>
            <td style="text-align:center;color:var(--danger);font-weight:600">${falt}</td>
            <td style="text-align:center;color:var(--text-muted)">${sinR}</td>
            <td>
              <div class="pct-bar-wrap">
                <div class="pct-bar-track">
                  <div class="pct-bar-fill" style="width:${pct ?? 0}%;background:${color}"></div>
                </div>
                <span class="pct-num" style="color:${color}">${pct !== null ? pct + "%" : "—"}</span>
              </div>
            </td>
          </tr>`;
          })
          .join("");

        document.getElementById("mainContent").innerHTML = `
          <div class="card" style="padding:0;overflow:hidden">
            <div style="overflow-x:auto">
              <table class="hist-table">
                <thead>
                  <tr>
                    <th>Alumno</th>
                    <th>Matrícula</th>
                    <th style="text-align:center">✓ Presentes</th>
                    <th style="text-align:center">✗ Faltas</th>
                    <th style="text-align:center">— Sin reg.</th>
                    <th style="min-width:160px">% Asistencia</th>
                  </tr>
                </thead>
                <tbody>${rows || '<tr><td colspan="6" style="text-align:center;padding:24px;color:var(--text-muted)">Sin registros en el período seleccionado.</td></tr>'}</tbody>
              </table>
            </div>
          </div>`;
      }

      const MESES_ES = [
        "Ene",
        "Feb",
        "Mar",
        "Abr",
        "May",
        "Jun",
        "Jul",
        "Ago",
        "Sep",
        "Oct",
        "Nov",
        "Dic",
      ];
      const DIAS_ES = ["Dom", "Lun", "Mar", "Mié", "Jue", "Vie", "Sáb"];

      function renderGrid(fechas) {
        if (!fechas.length) {
          document.getElementById("mainContent").innerHTML =
            `<div class="empty-state"><iconify-icon icon="lucide:calendar-x"></iconify-icon><p>No hay fechas registradas en el período.</p></div>`;
          return;
        }

        // Agrupar fechas por mes para los encabezados
        const meses = {};
        fechas.forEach((f) => {
          const [y, m] = f.split("-");
          const key = `${y}-${m}`;
          if (!meses[key])
            meses[key] = {
              label: `${MESES_ES[parseInt(m) - 1]} ${y}`,
              fechas: [],
            };
          meses[key].fechas.push(f);
        });

        // Fila de mes (agrupadora)
        const mesHeaders = Object.values(meses)
          .map(
            (m) =>
              `<th colspan="${m.fechas.length}" style="text-align:center;background:var(--primary);color:#fff;font-size:0.72rem;letter-spacing:.04em;border-right:2px solid rgba(255,255,255,.2);padding:7px 4px">${m.label}</th>`,
          )
          .join("");

        // Fila de día/fecha individual
        const diaHeaders = fechas
          .map((f) => {
            const d = new Date(f + "T12:00:00");
            const esFind = d.getDay() === 0 || d.getDay() === 6;
            return `<th title="${f}" style="text-align:center;font-size:0.65rem;font-weight:600;padding:5px 3px;min-width:30px;color:${esFind ? "var(--danger)" : "var(--text-muted)"}">
            <div>${d.getDate()}</div>
            <div style="font-weight:400;font-size:.6rem">${DIAS_ES[d.getDay()]}</div>
          </th>`;
          })
          .join("");

        // Filas de alumnos
        const rows = alumnosGrupo
          .map((a, idx) => {
            const reg = getRegistro(a.matricula);
            let presentes = 0,
              faltas = 0,
              sinReg = 0;
            const cells = fechas
              .map((f) => {
                const est = reg[f];
                if (est === "presente") {
                  presentes++;
                  return `<td class="cell-p" title="Presente — ${fmtFechaLarga(f)}">
                <iconify-icon icon="lucide:check" style="font-size:.9rem"></iconify-icon>
              </td>`;
                }
                if (est === "falta") {
                  faltas++;
                  return `<td class="cell-f" title="Falta — ${fmtFechaLarga(f)}">
                <iconify-icon icon="lucide:x" style="font-size:.9rem"></iconify-icon>
              </td>`;
                }
                sinReg++;
                return `<td class="cell-n" title="Sin registro — ${fmtFechaLarga(f)}">·</td>`;
              })
              .join("");

            const total = presentes + faltas;
            const pct =
              total > 0 ? Math.round((presentes / total) * 100) : null;
            const pctColor =
              pct === null
                ? "var(--text-muted)"
                : pct >= 80
                  ? "var(--success)"
                  : pct >= 60
                    ? "var(--warning)"
                    : "var(--danger)";
            const riesgoMark =
              pct !== null && pct < 80
                ? `<iconify-icon icon="lucide:alert-triangle" style="font-size:.8rem;color:var(--danger);margin-left:4px" title="En riesgo de reprobación por inasistencias"></iconify-icon>`
                : "";

            const bg = idx % 2 === 0 ? "" : "background:var(--bg-app)";
            return `<tr style="${bg}">
            <td class="sticky-col-name" style="font-weight:600;white-space:nowrap;${bg}">
              ${a.nombre}${riesgoMark}
            </td>
            <td style="font-size:0.72rem;color:var(--text-muted);white-space:nowrap;${bg}">${a.matricula}</td>
            ${cells}
            <td style="text-align:center;font-weight:700;color:${pctColor};white-space:nowrap;${bg}">
              ${pct !== null ? `<span>${pct}%</span><br><span style="font-size:.65rem;font-weight:400;color:var(--text-muted)">${presentes}P / ${faltas}F</span>` : "—"}
            </td>
          </tr>`;
          })
          .join("");

        // Fila de totales de la clase por fecha
        const totalesCells = fechas
          .map((f) => {
            let p = 0,
              fa = 0;
            alumnosGrupo.forEach((a) => {
              const est = getRegistro(a.matricula)[f];
              if (est === "presente") p++;
              else if (est === "falta") fa++;
            });
            const total = p + fa;
            const pct = total > 0 ? Math.round((p / total) * 100) : null;
            const col =
              pct === null
                ? "var(--text-muted)"
                : pct >= 80
                  ? "var(--success)"
                  : pct >= 60
                    ? "var(--warning)"
                    : "var(--danger)";
            return `<td style="text-align:center;background:var(--bg-app);border-top:2px solid var(--border)">
            <span style="font-size:.7rem;font-weight:700;color:${col}">${pct !== null ? pct + "%" : "—"}</span>
          </td>`;
          })
          .join("");

        document.getElementById("mainContent").innerHTML = `
          <style>
            .sticky-col-name {
              position:sticky;left:0;z-index:2;
              background:var(--card-bg);
              border-right:1px solid var(--border);
              min-width:160px;
            }
            .sticky-col-mat {
              position:sticky;left:160px;z-index:2;
              background:var(--card-bg);
              border-right:2px solid var(--border);
            }
            .cell-p { text-align:center;color:var(--success); }
            .cell-f { text-align:center;color:var(--danger);  }
            .cell-n { text-align:center;color:var(--border);font-size:.8rem; }
            .excel-table { width:100%;border-collapse:collapse;font-size:.82rem; }
            .excel-table th, .excel-table td {
              border:1px solid var(--border);
              padding:5px 4px;
            }
            .excel-table th {
              background:var(--bg-app);
              color:var(--text-muted);
              font-weight:600;
            }
          </style>
          <div class="card" style="padding:0;overflow:hidden">
            <div style="padding:14px 18px 10px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)">
              <iconify-icon icon="lucide:table" style="color:var(--primary);font-size:1.2rem"></iconify-icon>
              <span style="font-weight:600;font-size:.95rem">Lista de asistencia — ${alumnosGrupo.length} alumno${alumnosGrupo.length !== 1 ? "s" : ""} · ${fechas.length} clase${fechas.length !== 1 ? "s" : ""}</span>
              <div style="margin-left:auto;display:flex;gap:10px;font-size:.75rem">
                <span style="display:flex;align-items:center;gap:4px;color:var(--success)"><iconify-icon icon="lucide:check"></iconify-icon> Presente</span>
                <span style="display:flex;align-items:center;gap:4px;color:var(--danger)"><iconify-icon icon="lucide:x"></iconify-icon> Falta</span>
                <span style="display:flex;align-items:center;gap:4px;color:var(--text-muted)">· Sin registro</span>
              </div>
            </div>
            <div style="overflow-x:auto">
              <table class="excel-table">
                <thead>
                  <tr>
                    <th class="sticky-col-name" style="z-index:3;background:var(--bg-app)" rowspan="2">Alumno</th>
                    <th class="sticky-col-mat" style="z-index:3;background:var(--bg-app);min-width:90px" rowspan="2">Matrícula</th>
                    ${mesHeaders}
                    <th style="text-align:center;background:var(--bg-app);min-width:72px" rowspan="2">%<br><span style="font-weight:400;font-size:.65rem">P / F</span></th>
                  </tr>
                  <tr>${diaHeaders}</tr>
                </thead>
                <tbody>${rows}</tbody>
                <tfoot>
                  <tr>
                    <td class="sticky-col-name" colspan="2" style="font-size:.75rem;font-weight:700;color:var(--text-muted);background:var(--bg-app);border-top:2px solid var(--border)">
                      ASISTENCIA DEL DÍA
                    </td>
                    ${totalesCells}
                    <td style="background:var(--bg-app);border-top:2px solid var(--border)"></td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>`;
      }

      function renderFaltas(fechas) {
        // Tabla detallada: una fila por alumno con conteo acumulado y detalle por fecha
        const datos = alumnosGrupo
          .map((a) => {
            const reg = getRegistro(a.matricula);
            const faltasFechas = fechas
              .filter((f) => reg[f] === "falta")
              .sort();
            const presentes = fechas.filter(
              (f) => reg[f] === "presente",
            ).length;
            const total = presentes + faltasFechas.length;
            const pct =
              total > 0 ? Math.round((presentes / total) * 100) : null;
            return { ...a, faltasFechas, presentes, pct };
          })
          .filter((a) => a.faltasFechas.length > 0)
          .sort((a, b) => a.faltasFechas.length - b.faltasFechas.length); // más faltas al final

        if (!datos.length) {
          document.getElementById("mainContent").innerHTML = `
            <div class="card" style="text-align:center;padding:48px">
              <iconify-icon icon="lucide:party-popper" style="font-size:3rem;color:var(--success);display:block;margin:0 auto 12px"></iconify-icon>
              <p style="font-weight:600;font-size:1rem;color:var(--text-main);margin:0 0 4px">¡Sin faltas registradas!</p>
              <p style="font-size:.85rem;color:var(--text-muted);margin:0">Todos los alumnos tienen asistencia perfecta en el período seleccionado.</p>
            </div>`;
          return;
        }

        const filas = datos.map((a, idx) => {
          const pctColor =
            a.pct === null
              ? "var(--text-muted)"
              : a.pct >= 80
                ? "var(--success)"
                : a.pct >= 60
                  ? "var(--warning)"
                  : "var(--danger)";
          const riesgo = a.pct !== null && a.pct < 80;
          const bg = idx % 2 === 0 ? "" : "background:var(--bg-app)";

          // Chips de fechas de falta
          const fechaChips = a.faltasFechas
            .map((f) => {
              const d = new Date(f + "T12:00:00");
              return `<span style="display:inline-flex;align-items:center;gap:3px;background:var(--danger-light);color:var(--danger);
                               font-size:.72rem;font-weight:600;padding:2px 8px;border-radius:20px;margin:2px">
              <iconify-icon icon="lucide:x" style="font-size:.65rem"></iconify-icon>
              ${d.getDate()} ${MESES_ES[d.getMonth()]}
            </span>`;
            })
            .join("");

          return `<tr style="${bg}">
            <td style="font-weight:600;${bg}">
              ${a.nombre}
              ${riesgo ? `<span class="badge badge-danger" style="font-size:.68rem;margin-left:6px">RIESGO</span>` : ""}
            </td>
            <td style="font-size:.78rem;color:var(--text-muted);white-space:nowrap;${bg}">${a.matricula}</td>
            <td style="text-align:center;${bg}">
              <span style="display:inline-flex;align-items:center;gap:4px;font-weight:700;
                           background:var(--danger-light);color:var(--danger);
                           padding:3px 10px;border-radius:20px;font-size:.82rem">
                <iconify-icon icon="lucide:x-circle" style="font-size:.9rem"></iconify-icon>
                ${a.faltasFechas.length} falta${a.faltasFechas.length !== 1 ? "s" : ""}
              </span>
            </td>
            <td style="${bg}">${fechaChips}</td>
            <td style="text-align:center;${bg}">
              <span style="font-weight:700;color:${pctColor}">
                ${a.pct !== null ? a.pct + "%" : "—"}
              </span>
            </td>
          </tr>`;
        });

        document.getElementById("mainContent").innerHTML = `
          <div class="card" style="padding:0;overflow:hidden">
            <div style="padding:14px 18px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
              <iconify-icon icon="lucide:alert-triangle" style="color:var(--danger);font-size:1.2rem"></iconify-icon>
              <span style="font-weight:600;font-size:.95rem">${datos.length} alumno${datos.length !== 1 ? "s" : ""} con faltas en el período</span>
              <span style="margin-left:auto;font-size:.78rem;color:var(--text-muted)">Ordenado: menos faltas → más faltas</span>
            </div>
            <div style="overflow-x:auto">
              <table class="hist-table">
                <thead>
                  <tr>
                    <th>Alumno</th>
                    <th>Matrícula</th>
                    <th style="text-align:center">Total faltas</th>
                    <th>Fechas de inasistencia</th>
                    <th style="text-align:center">Asistencia %</th>
                  </tr>
                </thead>
                <tbody>${filas.join("")}</tbody>
              </table>
            </div>
          </div>`;
      }

      function cambiarVista(vista, btn) {
        vistaActual = vista;
        document
          .querySelectorAll(".vista-tab")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        aplicarFiltroFechas();
      }

      function mostrarVacio() {
        document.getElementById("statsRow").style.display = "none";
        document.getElementById("vistaTabs").style.display = "none";
        document.getElementById("mainContent").innerHTML =
          `<div class="empty-state" id="emptyState">
             <iconify-icon icon="lucide:calendar-search"></iconify-icon>
             <p>Selecciona un grupo para ver el historial de asistencias.</p>
           </div>`;
      }

      // ── Helpers ────────────────────────────────────────────────────
      function getRegistro(matricula) {
        try {
          return (
            JSON.parse(
              localStorage.getItem(STORE(`${grupoActual}_${matricula}`)),
            ) || {}
          );
        } catch {
          return {};
        }
      }

      function getPct(matricula, fechas) {
        if (!fechas.length) return null;
        const reg = getRegistro(matricula);
        const pres = fechas.filter((f) => reg[f] === "presente").length;
        return Math.round((pres / fechas.length) * 100);
      }

      function fmtFechaCorta(f) {
        // f = YYYY-MM-DD → DD/MM
        const [, m, d] = f.split("-");
        return `${d}/${m}`;
      }

      function fmtFechaLarga(f) {
        if (typeof fmtFecha === "function") return fmtFecha(f);
        const [a, m, d] = f.split("-");
        return `${d}/${m}/${a}`;
      }

      function exportarCSV() {
        if (!alumnosGrupo.length) {
          if (typeof showToast === "function")
            showToast("Sin datos para exportar", "info");
          return;
        }
        const fechas = todasFechas;
        const header = ["Matricula", "Nombre", ...fechas, "% Asistencia"];
        const rows = alumnosGrupo.map((a) => {
          const reg = getRegistro(a.matricula);
          const celdas = fechas.map((f) =>
            reg[f] === "presente" ? "P" : reg[f] === "falta" ? "F" : "",
          );
          const pct = getPct(a.matricula, fechas);
          return [
            `"${a.matricula}"`,
            `"${a.nombre}"`,
            ...celdas,
            pct !== null ? pct + "%" : "",
          ];
        });
        const csv = [header, ...rows].map((r) => r.join(",")).join("\n");
        const blob = new Blob([csv], { type: "text/csv;charset=utf-8;" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `historial_asist_g${grupoActual}.csv`;
        link.click();
        URL.revokeObjectURL(url);
        if (typeof showToast === "function")
          showToast("CSV exportado", "success");
      }
    </script>
  </body>
</html>
