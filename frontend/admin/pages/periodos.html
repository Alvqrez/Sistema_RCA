<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Periodos Escolares — RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro")
        document.documentElement.classList.add("dark-mode");
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/styles.css" />
    <style>
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: var(--card-bg);
        border-radius: 14px;
        width: min(520px, 100%);
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        animation: modalIn 0.18s ease;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal-header {
        padding: 20px 22px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
        border-bottom: 1px solid var(--border);
        padding-bottom: 14px;
      }
      .modal-header h3 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 700;
      }
      .modal-close-btn {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: none;
        background: var(--bg-secondary);
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .modal-close-btn:hover {
        background: #fee2e2;
        color: #991b1b;
      }
      .modal-body {
        padding: 20px 22px;
        display: grid;
        gap: 14px;
      }
      .modal-footer {
        padding: 14px 22px 18px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-top: 1px solid var(--border);
      }
      .fgroup {
        display: grid;
        gap: 5px;
      }
      .fgroup label {
        font-size: 0.78rem;
        font-weight: 700;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .fgroup select,
      .fgroup input {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
        color: var(--text-primary);
        font-size: 0.9rem;
        font-family: inherit;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .fgroup select:focus,
      .fgroup input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }
      .form-grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>
      <main class="content">
        <div class="page-header-v2">
          <div>
            <h1>Periodos Escolares</h1>
            <p class="page-subtitle">
              Gestión de ciclos académicos del Instituto
            </p>
          </div>
          <div class="header-actions">
            <button class="btn btn-primary" onclick="abrirModalNuevo()">
              <iconify-icon icon="mdi:plus"></iconify-icon> Nuevo periodo
            </button>
          </div>
        </div>

        <!-- Lista de periodos -->
        <div class="card card-collapsible" data-open>
          <div class="card-title">
            <iconify-icon icon="mdi:calendar-multiple"></iconify-icon>
            Lista de periodos
            <button
              class="card-toggle-btn"
              onclick="toggleCard(this)"
              title="Contraer"
            >
              <iconify-icon icon="lucide:chevron-down"></iconify-icon>
            </button>
          </div>
          <div class="card-body">
            <div class="tabla-wrapper">
              <table>
                <thead>
                  <tr>
                    <th>ID</th>
                    <th>Descripcion</th>
                    <th>Año</th>
                    <th>Inicio</th>
                    <th>Fin</th>
                    <th>Estatus</th>
                    <th>Acciones</th>
                  </tr>
                </thead>
                <tbody id="tablaPeriodos">
                  <tr>
                    <td
                      colspan="7"
                      style="
                        text-align: center;
                        padding: 24px;
                        color: var(--text-muted);
                      "
                    >
                      Cargando...
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- ═══════════ MODAL NUEVO / EDITAR PERIODO ═══════════ -->
    <div
      id="modalPeriodo"
      class="modal-overlay"
      onclick="modalClickFuera(event)"
    >
      <div class="modal-box">
        <div class="modal-header">
          <h3 id="modalPeriodoTitulo">
            <iconify-icon
              icon="mdi:calendar-plus-outline"
              style="vertical-align: middle; margin-right: 6px"
            ></iconify-icon>
            Nuevo periodo
          </h3>
          <button class="modal-close-btn" onclick="cerrarModal()">
            <iconify-icon icon="mdi:close"></iconify-icon>
          </button>
        </div>
        <div class="modal-body">
          <!-- Descripción -->
          <div class="fgroup">
            <label
              >Descripcion <span style="color: var(--danger)">*</span></label
            >
            <select id="pDesc" onchange="autoFechas()">
              <option value="">— Selecciona el periodo —</option>
              <option value="Enero-Junio">Enero-Junio</option>
              <option value="Verano">Verano</option>
              <option value="Agosto-Diciembre">Agosto-Diciembre</option>
            </select>
          </div>

          <!-- Año -->
          <div class="fgroup">
            <label>Año <span style="color: var(--danger)">*</span></label>
            <input
              type="number"
              id="pAnio"
              placeholder="2026"
              min="2024"
              max="2099"
              onchange="autoFechas()"
            />
          </div>

          <!-- Dias de inicio y fin -->
          <div class="form-grid-2">
            <div class="fgroup">
              <label
                >Dia de inicio
                <span style="color: var(--danger)">*</span></label
              >
              <input
                type="number"
                id="pDiaInicio"
                min="1"
                max="31"
                placeholder="1"
              />
              <small
                id="pInicioHint"
                style="
                  font-size: 0.74rem;
                  color: var(--text-muted);
                  margin-top: 2px;
                  display: block;
                "
              ></small>
            </div>
            <div class="fgroup">
              <label
                >Dia de fin <span style="color: var(--danger)">*</span></label
              >
              <input
                type="number"
                id="pDiaFin"
                min="1"
                max="31"
                placeholder="30"
              />
              <small
                id="pFinHint"
                style="
                  font-size: 0.74rem;
                  color: var(--text-muted);
                  margin-top: 2px;
                  display: block;
                "
              ></small>
            </div>
          </div>

          <!-- Estatus -->
          <div class="fgroup">
            <label>Estatus</label>
            <select id="pEstatus">
              <option value="Proximo">Proximo</option>
              <option value="Vigente">Vigente (activo)</option>
              <option value="Concluido">Concluido</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="cerrarModal()">
            Cancelar
          </button>
          <button
            class="btn btn-primary"
            onclick="guardarPeriodo()"
            id="btnGuardarPeriodo"
          >
            <iconify-icon icon="mdi:content-save-outline"></iconify-icon>
            <span id="lblBtnPeriodo">Crear periodo</span>
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../shared/js/sidebar.js"></script>
    <script>
      const tk = () => localStorage.getItem("token");
      let editandoId = null;

      /* Rangos fijos por descripcion */
      const RANGOS = {
        "Enero-Junio": {
          mesI: "01",
          mesF: "06",
          lblI: "enero",
          lblF: "junio",
          diaI: 6,
          diaF: 30,
        },
        Verano: {
          mesI: "07",
          mesF: "07",
          lblI: "julio",
          lblF: "julio",
          diaI: 1,
          diaF: 31,
        },
        "Agosto-Diciembre": {
          mesI: "08",
          mesF: "12",
          lblI: "agosto",
          lblF: "diciembre",
          diaI: 1,
          diaF: 20,
        },
      };

      /* Inicializar min del año */
      document.getElementById("pAnio").min = new Date().getFullYear();

      /* Autocompletar hints y valores por defecto al cambiar descripcion/año */
      function autoFechas() {
        const desc = document.getElementById("pDesc").value;
        const anio = document.getElementById("pAnio").value;
        const rango = RANGOS[desc];
        const hintI = document.getElementById("pInicioHint");
        const hintF = document.getElementById("pFinHint");
        if (!rango || !anio) {
          hintI.textContent = "";
          hintF.textContent = "";
          return;
        }
        if (!document.getElementById("pDiaInicio").value)
          document.getElementById("pDiaInicio").value = rango.diaI;
        if (!document.getElementById("pDiaFin").value)
          document.getElementById("pDiaFin").value = rango.diaF;
        hintI.textContent = "Mes fijo: " + rango.lblI + " " + anio;
        hintF.textContent = "Mes fijo: " + rango.lblF + " " + anio;
      }

      /* Construye YYYY-MM-DD desde descripcion, año y dia */
      function construirFecha(tipo) {
        const desc = document.getElementById("pDesc").value;
        const anio = document.getElementById("pAnio").value;
        const rango = RANGOS[desc];
        if (!rango || !anio) return null;
        const dia = document.getElementById(
          tipo === "inicio" ? "pDiaInicio" : "pDiaFin",
        ).value;
        if (!dia) return null;
        const mes = tipo === "inicio" ? rango.mesI : rango.mesF;
        return anio + "-" + mes + "-" + String(dia).padStart(2, "0");
      }

      /* Abrir modal para nuevo periodo */
      function abrirModalNuevo() {
        editandoId = null;
        document.getElementById("pDesc").value = "";
        document.getElementById("pAnio").value = "";
        document.getElementById("pDiaInicio").value = "";
        document.getElementById("pDiaFin").value = "";
        document.getElementById("pEstatus").value = "Proximo";
        document.getElementById("pInicioHint").textContent = "";
        document.getElementById("pFinHint").textContent = "";
        document.getElementById("modalPeriodoTitulo").innerHTML =
          '<iconify-icon icon="mdi:calendar-plus-outline" style="vertical-align:middle;margin-right:6px"></iconify-icon>Nuevo periodo';
        document.getElementById("lblBtnPeriodo").textContent = "Crear periodo";
        document.getElementById("modalPeriodo").classList.add("active");
      }

      /* Abrir modal para editar */
      function editarPeriodo(p) {
        editandoId = p.id_periodo;
        document.getElementById("pDesc").value = p.descripcion || "";
        const anio =
          p.anio ||
          (p.fecha_inicio
            ? p.fecha_inicio.toString().split("T")[0].substring(0, 4)
            : "");
        document.getElementById("pAnio").value = anio;
        const fi = p.fecha_inicio
          ? p.fecha_inicio.toString().split("T")[0]
          : "";
        const ff = p.fecha_fin ? p.fecha_fin.toString().split("T")[0] : "";
        document.getElementById("pDiaInicio").value = fi
          ? parseInt(fi.split("-")[2])
          : "";
        document.getElementById("pDiaFin").value = ff
          ? parseInt(ff.split("-")[2])
          : "";
        document.getElementById("pEstatus").value = p.estatus;
        document.getElementById("modalPeriodoTitulo").innerHTML =
          '<iconify-icon icon="mdi:pencil-outline" style="vertical-align:middle;margin-right:6px"></iconify-icon>Editar: ' +
          p.descripcion +
          " " +
          p.anio;
        document.getElementById("lblBtnPeriodo").textContent =
          "Actualizar periodo";
        autoFechas();
        document.getElementById("modalPeriodo").classList.add("active");
      }

      function cerrarModal() {
        document.getElementById("modalPeriodo").classList.remove("active");
      }

      function modalClickFuera(e) {
        if (e.target.id === "modalPeriodo") cerrarModal();
      }

      /* Guardar */
      async function guardarPeriodo() {
        const desc = document.getElementById("pDesc").value.trim();
        const anio = document.getElementById("pAnio").value;
        const diaI = document.getElementById("pDiaInicio").value;
        const diaF = document.getElementById("pDiaFin").value;

        if (!desc || !anio || !diaI || !diaF) {
          showToast("Completa todos los campos requeridos", "error");
          return;
        }
        if (parseInt(anio) < new Date().getFullYear()) {
          showToast("El año no puede ser anterior al año actual", "error");
          return;
        }
        const fecha_inicio = construirFecha("inicio");
        const fecha_fin = construirFecha("fin");
        if (!fecha_inicio || !fecha_fin) {
          showToast("Error al construir las fechas", "error");
          return;
        }
        if (new Date(fecha_inicio) >= new Date(fecha_fin)) {
          showToast(
            "La fecha de inicio debe ser anterior a la de fin",
            "error",
          );
          return;
        }

        const body = {
          descripcion: desc,
          fecha_inicio: diaI,
          fecha_fin: diaF,
          estatus: document.getElementById("pEstatus").value,
        };
        const url = editandoId
          ? `${API_URL}/api/periodos/${editandoId}`
          : `${API_URL}/api/periodos`;
        const method = editandoId ? "PUT" : "POST";

        try {
          const r = await fetch(url, {
            method,
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + tk(),
            },
            body: JSON.stringify(body),
          });
          const d = await r.json();
          if (d.success) {
            showToast(
              editandoId
                ? "Periodo actualizado"
                : "Periodo creado correctamente",
            );
            cerrarModal();
            cargarPeriodos();
          } else {
            showToast(d.error || "Error al guardar", "error");
          }
        } catch {
          showToast("Error de conexion", "error");
        }
      }

      /* Cargar lista */
      async function cargarPeriodos() {
        const r = await fetch(API_URL + "/api/periodos", {
          headers: { Authorization: "Bearer " + tk() },
        });
        const datos = await r.json();
        const tbody = document.getElementById("tablaPeriodos");
        tbody.innerHTML = "";
        if (!datos.length) {
          tbody.innerHTML =
            '<tr><td colspan="7" style="text-align:center;padding:24px;color:var(--text-muted)">Sin periodos registrados</td></tr>';
          return;
        }
        datos.forEach((p) => {
          const col =
            {
              Vigente: "badge-aprobado",
              Concluido: "badge-np",
              Proximo: "badge-pendiente",
            }[p.estatus] || "badge-pendiente";
          const btnDel =
            p.estatus !== "Vigente"
              ? `<button class="btn btn-sm btn-danger-outline" onclick="eliminarPeriodo(${p.id_periodo})" title="Eliminar">
                <iconify-icon icon="mdi:delete-outline"></iconify-icon>
               </button>`
              : "";
          tbody.innerHTML += `<tr>
            <td style="font-size:.78rem;color:var(--text-muted);font-weight:600">#${p.id_periodo}</td>
            <td><strong>${p.descripcion}</strong></td>
            <td>${p.anio}</td>
            <td style="font-size:.82rem">${fmtFecha(p.fecha_inicio)}</td>
            <td style="font-size:.82rem">${fmtFecha(p.fecha_fin)}</td>
            <td><span class="badge-estatus ${col}">${p.estatus}</span></td>
            <td style="display:flex;gap:6px">
              <button class="btn btn-sm btn-outline" onclick='editarPeriodo(${JSON.stringify(p).replace(/'/g, "&#39;")})' title="Editar">
                <iconify-icon icon="mdi:pencil-outline"></iconify-icon>
              </button>
              ${btnDel}
            </td>
          </tr>`;
        });
      }

      async function eliminarPeriodo(id) {
        if (
          !confirm(
            "Eliminar este periodo? Solo es posible si no tiene grupos asignados.",
          )
        )
          return;
        const r = await fetch(API_URL + "/api/periodos/" + id, {
          method: "DELETE",
          headers: { Authorization: "Bearer " + tk() },
        });
        const d = await r.json();
        if (d.success) {
          showToast("Periodo eliminado");
          cargarPeriodos();
        } else showToast(d.error || "Error al eliminar", "error");
      }

      soloPermitido?.("administrador");
      cargarPeriodos();
    </script>
  </body>
</html>
