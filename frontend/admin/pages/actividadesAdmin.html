<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Actividades — RCA</title>
    <script>
      if (localStorage.getItem("tema") === "oscuro")
        document.documentElement.classList.add("dark-mode");
    </script>
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
    <link
      rel="icon"
      type="image/png"
      href="../../assets/images/icons/rca-icon.png"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../../css/styles.css" />
    <style>
      /* ── Filtros ─────────────────────────────────────────────────────── */
      .filter-row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      .filter-row select,
      .filter-row input {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
        color: var(--text-primary);
        font-size: 0.88rem;
        font-family: inherit;
        flex: 1;
        min-width: 150px;
      }

      /* ── Tabla ───────────────────────────────────────────────────────── */
      .act-table {
        width: 100%;
        border-collapse: collapse;
      }
      .act-table th {
        font-size: 0.73rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
        padding: 10px 14px;
        text-align: left;
        border-bottom: 1px solid var(--border);
        background: var(--bg-secondary);
      }
      .act-table th:first-child {
        border-radius: 8px 0 0 0;
      }
      .act-table th:last-child {
        border-radius: 0 8px 0 0;
      }
      .act-table td {
        padding: 11px 14px;
        font-size: 0.88rem;
        border-bottom: 1px solid var(--border);
        color: var(--text-primary);
        vertical-align: middle;
      }
      .act-table tr:last-child td {
        border-bottom: none;
      }
      .act-table tr:hover td {
        background: var(--bg-secondary);
      }

      /* ── Badge tipo ──────────────────────────────────────────────────── */
      .badge-tipo {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 10px;
        border-radius: 999px;
        font-size: 0.75rem;
        font-weight: 600;
        background: var(--primary-light, #eff6ff);
        color: var(--primary, #2563eb);
      }
      .badge-semestre {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 0.73rem;
        font-weight: 600;
        background: #f0fdf4;
        color: #166534;
      }

      /* ── Modal overlay ───────────────────────────────────────────────── */
      .modal-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }
      .modal-overlay.active {
        display: flex;
      }
      .modal-box {
        background: var(--card-bg);
        border-radius: 14px;
        width: min(520px, 100%);
        max-height: 90vh;
        overflow-y: auto;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
        animation: modalIn 0.18s ease;
      }
      @keyframes modalIn {
        from {
          opacity: 0;
          transform: translateY(10px) scale(0.97);
        }
        to {
          opacity: 1;
          transform: none;
        }
      }
      .modal-header {
        padding: 20px 22px 0;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .modal-header h3 {
        margin: 0;
        font-size: 1rem;
        font-weight: 700;
      }
      .modal-close {
        width: 30px;
        height: 30px;
        border-radius: 8px;
        border: none;
        background: var(--bg-secondary);
        cursor: pointer;
        color: var(--text-muted);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.15s;
      }
      .modal-close:hover {
        background: #fee2e2;
        color: #991b1b;
      }
      .modal-body {
        padding: 18px 22px;
        display: grid;
        gap: 14px;
      }
      .modal-footer {
        padding: 12px 22px 18px;
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        border-top: 1px solid var(--border);
      }

      /* ── Form grupos ─────────────────────────────────────────────────── */
      .fgroup {
        display: grid;
        gap: 5px;
      }
      .fgroup label {
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--text-muted);
      }
      .fgroup select,
      .fgroup input {
        padding: 9px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--card-bg);
        color: var(--text-primary);
        font-size: 0.9rem;
        font-family: inherit;
        transition:
          border-color 0.15s,
          box-shadow 0.15s;
      }
      .fgroup select:focus,
      .fgroup input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
      }
      .fgroup select:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ── Stepper visual ──────────────────────────────────────────────── */
      .step-hint {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 0.78rem;
        color: var(--text-muted);
        padding: 8px 12px;
        background: var(--bg-secondary);
        border-radius: 8px;
        border: 1px solid var(--border);
      }

      /* ── Materia chip en select ──────────────────────────────────────── */
      .materia-info-row {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        background: var(--primary-light, #eff6ff);
        border-radius: 8px;
        border: 1px solid var(--border);
        font-size: 0.85rem;
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar"></aside>
      <main class="content">
        <div class="page-header-v2">
          <div>
            <h1>Actividades</h1>
            <p class="page-subtitle">
              Catálogo de actividades evaluables definidas por materia
            </p>
          </div>
          <div class="header-actions">
            <button class="btn btn-primary" onclick="abrirModalNueva()">
              <iconify-icon icon="mdi:plus"></iconify-icon> Nueva actividad
            </button>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-row" style="margin-bottom: 20px">
          <div class="stat-card">
            <iconify-icon
              icon="mdi:clipboard-list-outline"
              class="stat-icon"
            ></iconify-icon>
            <div class="stat-info">
              <span class="stat-value" id="statTotal">—</span>
              <span class="stat-label">Total actividades</span>
            </div>
          </div>
          <div class="stat-card">
            <iconify-icon
              icon="lucide:book"
              class="stat-icon"
              style="color: var(--primary)"
            ></iconify-icon>
            <div class="stat-info">
              <span class="stat-value" id="statMaterias">—</span>
              <span class="stat-label">Materias cubiertas</span>
            </div>
          </div>
          <div class="stat-card">
            <iconify-icon
              icon="mdi:tag-multiple-outline"
              class="stat-icon"
              style="color: var(--success, #16a34a)"
            ></iconify-icon>
            <div class="stat-info">
              <span class="stat-value" id="statTipos">—</span>
              <span class="stat-label">Tipos distintos</span>
            </div>
          </div>
        </div>

        <!-- Filtros -->
        <div class="card" style="padding: 16px 20px; margin-bottom: 16px">
          <div class="filter-row">
            <select id="filtroCarrera" onchange="filtrar()">
              <option value="">Todas las carreras</option>
            </select>
            <select id="filtroMateria" onchange="filtrar()">
              <option value="">Todas las materias</option>
            </select>
            <input
              type="text"
              id="filtroBusqueda"
              placeholder="🔍 Buscar por nombre…"
              oninput="filtrar()"
            />
          </div>
        </div>

        <!-- Tabla -->
        <div class="card" style="overflow: hidden">
          <div style="overflow-x: auto">
            <table class="act-table">
              <thead>
                <tr>
                  <th>Materia</th>
                  <th>Carrera</th>
                  <th>Semestre</th>
                  <th>Unidad</th>
                  <th>Tipo</th>
                  <th>Nombre de actividad</th>
                  <th style="width: 60px"></th>
                </tr>
              </thead>
              <tbody id="tablaBody">
                <tr>
                  <td
                    colspan="7"
                    style="
                      text-align: center;
                      padding: 30px;
                      color: var(--text-muted);
                    "
                  >
                    Cargando...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- ══════════════════════════════════════════════════════
         MODAL NUEVA ACTIVIDAD
    ══════════════════════════════════════════════════════ -->
    <div id="modalNueva" class="modal-overlay" onclick="modalClickFuera(event)">
      <div class="modal-box">
        <div class="modal-header">
          <h3>Nueva actividad</h3>
          <button class="modal-close" onclick="cerrarModal()">
            <iconify-icon icon="mdi:close"></iconify-icon>
          </button>
        </div>
        <div class="modal-body">
          <!-- Paso 1: Carrera -->
          <div class="fgroup">
            <label>1. Carrera <span style="color: red">*</span></label>
            <select id="mCarrera" onchange="onCarreraChange()">
              <option value="">— Selecciona una carrera —</option>
            </select>
          </div>

          <!-- Paso 2: Materia (aparece al seleccionar carrera) -->
          <div class="fgroup" id="wrapMateria" style="display: none">
            <label>2. Materia <span style="color: red">*</span></label>
            <select id="mMateria" onchange="onMateriaChange()">
              <option value="">— Selecciona una materia —</option>
            </select>
            <div id="mMateriaInfo" class="materia-info-row"></div>
          </div>

          <!-- Paso 3: Unidad (aparece al seleccionar materia) -->
          <div class="fgroup" id="wrapUnidad" style="display: none">
            <label>3. Unidad <span style="color: red">*</span></label>
            <select id="mUnidad" onchange="onUnidadChange()">
              <option value="">— Selecciona una unidad —</option>
            </select>
          </div>

          <!-- Pasos 4 y 5: Tipo + Nombre (aparece al seleccionar unidad) -->
          <div
            id="wrapTipoNombre"
            style="display: none; display: grid; gap: 14px; display: none"
          >
            <div class="fgroup">
              <label>4. Tipo de actividad</label>
              <select id="mTipo">
                <option value="">— Sin tipo específico —</option>
              </select>
            </div>
            <div class="fgroup">
              <label
                >5. Nombre de la actividad
                <span style="color: red">*</span></label
              >
              <input
                id="mNombre"
                type="text"
                placeholder="Ej. Examen Parcial 1, Práctica de Laboratorio…"
                maxlength="100"
              />
            </div>
          </div>

          <!-- Hint inicial -->
          <div id="modalHint" class="step-hint">
            <iconify-icon icon="lucide:info"></iconify-icon>
            Selecciona una carrera para comenzar
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="cerrarModal()">
            Cancelar
          </button>
          <button
            class="btn btn-primary"
            onclick="guardarActividad()"
            id="btnGuardar"
            disabled
          >
            <iconify-icon icon="mdi:content-save-outline"></iconify-icon>
            Guardar
          </button>
        </div>
      </div>
    </div>

    <div id="toast-container"></div>
    <script src="../../shared/js/sidebar.js"></script>
    <script src="../../admin/js/actividadesAdmin.js"></script>
  </body>
</html>
